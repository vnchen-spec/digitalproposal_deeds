<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>契約中的空間 · Space in the Deeds</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0D0C09;--sf:#151310;--cd:#1D1B14;--cx:#242018;
  --br:rgba(210,178,100,0.1);--brh:rgba(210,178,100,0.22);
  --tx:#e8e1d1;--mt:#837a6b;--dm:#4e4a44;--hl:#C09040;
  --r:6px
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--tx);font-family:system-ui,-apple-system,sans-serif;overflow:hidden}
#app{display:grid;grid-template-rows:50px 1fr 105px;width:calc(100% / 1.25);height:calc(100vh / 1.25);min-height:432px;background:var(--bg);transform:scale(1.25);transform-origin:top left}
/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:var(--sf);border-bottom:0.5px solid var(--br);flex-shrink:0}
.ttl{display:flex;flex-direction:column;gap:1px}
.ttl-m{font-size:13px;font-weight:500;color:var(--tx);letter-spacing:.1em}
.ttl-s{font-size:9px;color:var(--mt);letter-spacing:.05em}
.tg{display:flex;gap:3px;background:var(--bg);border:0.5px solid var(--br);border-radius:5px;padding:2px}
.tbtn{padding:4px 18px;border:0.5px solid transparent;border-radius:3px;background:transparent;color:var(--mt);cursor:pointer;display:flex;flex-direction:column;align-items:center;line-height:1.25;transition:all .15s}
.tbtn .z{font-size:13px;letter-spacing:.05em}
.tbtn .e{font-size:8px;opacity:.65}
.tbtn.active{background:var(--cd);color:var(--hl);border-color:var(--brh)}
/* MAIN GRID */
.main{display:grid;grid-template-columns:205px 1fr 300px;overflow:hidden}
/* PANEL */
.panel{display:flex;flex-direction:column;overflow:hidden;border-right:0.5px solid var(--br)}
.panel:last-child{border-right:none;border-left:0.5px solid var(--br)}
.ph{padding:9px 13px 8px;border-bottom:0.5px solid var(--br);flex-shrink:0;display:flex;align-items:flex-start;gap:8px}
.ph::before{content:'';width:2px;height:14px;background:var(--hl);border-radius:1px;opacity:.45;flex-shrink:0;margin-top:1px}
.ph-t span{display:block}
.ph-t .z{font-size:11px;color:var(--tx);letter-spacing:.07em}
.ph-t .e{font-size:9px;color:var(--mt)}
.pb{flex:1;overflow-y:auto;padding:8px 11px;scrollbar-width:thin;scrollbar-color:var(--dm) transparent}
/* CENTER PANEL */
.cpanel{display:flex;flex-direction:column;overflow:hidden}
.cph{padding:9px 15px 8px;border-bottom:0.5px solid var(--br);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.cb{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:6px;background:var(--bg)}
/* FOOTER */
.ftr{padding:8px 20px 7px;background:var(--sf);border-top:0.5px solid var(--br);display:flex;flex-direction:column;gap:4px}
.fl{display:flex;align-items:center;gap:13px}
.tll{font-size:9px;color:var(--mt);line-height:1.6;white-space:nowrap;text-align:right;min-width:36px}
.yn{font-size:24px;font-weight:600;color:var(--hl);min-width:48px;text-align:right;line-height:1;letter-spacing:.03em;flex-shrink:0}
.tldts{display:flex;font-size:9px;color:var(--dm);gap:0}
.yd{font-size:10px;line-height:1.55;display:flex;flex-wrap:wrap;gap:4px;align-items:baseline}
.yd .z{color:var(--tx);font-size:10px}
.yd .e{color:var(--mt);font-size:9px;font-style:italic}
.leg{display:flex;gap:11px;flex-wrap:wrap;align-items:center;padding-top:1px}
.li{display:flex;align-items:center;gap:4px}
.ls{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.li .z{font-size:9px;color:var(--tx)}
.li .e{font-size:8px;color:var(--mt)}
/* EXTRACT */
.ei{border-left:2px solid transparent;padding:7px 9px;margin-bottom:5px;border-radius:3px;background:rgba(255,255,255,0.02);transition:opacity .2s}
.br-lbl{font-size:9px;display:flex;align-items:center;gap:4px;margin-bottom:3px}
.zh-src{font-size:11px;color:var(--tx);line-height:1.7;font-family:'Songti SC','STSong','SimSun','Noto Serif SC',serif;margin-bottom:3px}
.en-tr{font-size:10px;color:var(--mt);line-height:1.5;font-style:italic}
/* TOOLTIP */
.tt{position:fixed;background:var(--cx);border:0.5px solid var(--brh);border-radius:5px;padding:8px 10px;font-size:11px;max-width:210px;pointer-events:none;z-index:9999;display:none;line-height:1.55;color:var(--tx)}
input[type=range]{flex:1;-webkit-appearance:none;height:2px;background:var(--dm);border-radius:1px;cursor:pointer;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:var(--hl);border-radius:50%;cursor:pointer}
input[type=range]::-moz-range-thumb{width:14px;height:14px;background:var(--hl);border-radius:50%;border:none;cursor:pointer}
</style>
</head>

<div id="app">
  <header class="hdr">
    <div class="ttl">
      <span class="ttl-m"> Space in the Deeds</span>

    <div style="display:flex;align-items:center;gap:14px">

  <div class="main">
    <div class="panel">

      <div class="cb" id="dcon"></div>
    </div>
    <div class="panel">
      <div class="ph"><div class="ph-t"><span class="z">家族譜系</span><span class="e">Genealogy · click to filter</span></div></div>
      <div class="pb" style="padding:6px" id="tcon"></div>
    </div>
  </div>
  <footer class="ftr">
    <div class="fl">

      <input type="range" id="tl" min="0" max="1" step="1" value="0" oninput="setYear(+this.value)">

    </div>
    <div class="tldts" id="tldts"></div>
    <div class="yd" id="ydesc"></div>
    <div class="leg" id="gleg"></div>
  </footer>
</div>
<div class="tt" id="tt"></div>

    {b:'zhong',zh:'仲房：左邊後正房壹橺・後六㮼壹橺・後撇榭壹橺・横厝第壹檑',en:'Zhong: rear main room · rear six-bent bay · rear end annex · 1st transverse wing unit'},
    {b:'shu',zh:'叔房：左邊書院第壹檑貳橺・横厝第叁檑貳橺・下翼頭倚右壹檑',en:'Shu: study unit 1 · transverse wing 3rd unit · lower wing-tip (right)'},
    {b:'ji',zh:'季房：左邊書院第貳榴貳橺・横厝第肆榴貳橺・遇水楼壹橺',en:'Ji: study unit 2 · transverse wing 4th unit · connector bay'},
    {b:'communal',zh:'祠堂首次出現作為地理座標（1814），九年間由院內祭祀發展為獨立宗族機構',en:'Citang 祠堂 suddenly appears as landmark — built in the nine years since 1805; domestic worship → formal clan institution'},
  ]
};
const TE=[
  [{b:null,zh:'今因少銀使用，自願將祖父所遺，坐落磜田高牌上水田五十把，大小八坵，抵押與叔朝福借銀五元正。利每年至田中量谷捌斗，分兩季交清，不敢短少。',en:'Being short of silver, I voluntarily pledge 50 bundles of paddy (8 plots) inherited from my grandfather at Gaopai-shang to uncle Chaofu for 5 silver dollars. Interest: 8 dou grain per year in two seasonal installments, without shortage.'}],
  [{b:'dian',zh:'坐落土名集慶樓內，上堂左片過井地四橺，地脚角橺并浮棚頂上叁橺，并廳堂阁路一并在内…典與連魁，銀頭拾員正。附：利谷不清，此典契即轉賣契。',en:'Within Jiqing Lou: upper hall, left wing past the well — 4 bays + ground floor corner + 3 loft bays + hall corridor. Mortgaged to Liankui for 10 dollars. Addendum: if interest grain unpaid, pledge converts to outright sale.'}],
  [{b:'transferred',zh:'集慶樓内地脚過井右片樓橺走橺…楼橼自典之後，任憑欽彩侄封鎖管業居住，不得另典他人。',en:'Ground floor, right wing past the well — 走橺 (uncertain; 走 may mean circulation / passage bay, not a room one dwells in). Mortgage transferred to nephew Qincai for 13 dollars. "Qincai may lock, manage, and reside; must not re-mortgage."'}],
  [{b:'dian',zh:'集慶樓内，下堂左片尾棚正間壹間，又帶樓外糞堈壹口。',en:'Lower hall, left rear shed room — one room. Appended (又帶): one manure pit outside the tulou wall. No boundary formula for the pit — a gray zone between private and structural. 5 dollars — smallest transaction.'}],
  [{b:null,zh:'情因伯祖餘里公所立遺嘱之烝田一處，土名高牌上，禾田五十把，大小七坵。因不肖孫傳泰賣與姪孫欽彩，今因祭掃無需，执遺嘱人沾蔭等前来備酒請房族商議。',en:'The sacrificial land at Gaopai-shang established by great-uncle Yuli\'s will — 50 bundles of paddy across 7 plots — was sold by the unworthy grandson Chuan\'tai to Qincai. No funds remain for grave-sweeping. Lineage convenes; Qincai pays 5 additional dollars into the communal fund.'}],
];

function tt(e,h){const t=document.getElementById('tt');t.innerHTML=h;t.style.display='block';t.style.left=(e.clientX+14)+'px';t.style.top=(e.clientY-8)+'px'}
function ht(){document.getElementById('tt').style.display='none'}
function setMode(m){mode=m;year=0;sel=null;document.querySelectorAll('.tbtn').forEach((b,i)=>b.classList.toggle('active',(i===0&&m==='dacuo')||(i===1&&m==='tulou')));renderAll()}
function setYear(y){year=y;renderAll()}
function selP(id){sel=sel===id?null:id;renderAll()}

function renderAll(){
  const ys=mode==='dacuo'?DY:TY;
  document.getElementById('tl').max=ys.length-1;
  document.getElementById('tl').value=year;
  document.getElementById('ydisp').textContent=ys[year].label;
  document.getElementById('ybadge').textContent=ys[year].label;
  document.getElementById('tldts').innerHTML=ys.map((y,i)=>`<span style="flex:1;text-align:${i===0?'left':i===ys.length-1?'right':'center'};color:${i===year?'var(--hl)':'var(--dm)'};font-weight:${i===year?600:400};transition:color .2s">${y.label}</span>`).join('');
  document.getElementById('ydesc').innerHTML=`<span class="z">${ys[year].zh}</span><span class="e"> — ${ys[year].en}</span>`;
  if(mode==='dacuo'){
    rDacuo();rDTree();rDE();rDLeg();
    document.getElementById('cl-z').textContent='金氏族產 · 玉渡湖 · 珠琳堂';
    document.getElementById('cl-e').textContent="Jin family · Yulin Tang · Yuhu";
  }else{
    rTulou();rTTree();rTE();rTLeg();
    document.getElementById('cl-z').textContent='集慶樓 · 胡氏空間交易';
    document.getElementById('cl-e').textContent='Jiqing Lou 集慶樓 · Hu family spatial transactions';
  }
}

function rDacuo(){
  const rooms=year===0?R05:R14;
  const sb=sel?DTREE.persons.find(p=>p.id===sel)?.b:null;
  const W=378,H=318;
  const bg=`<rect width="${W}" height="${H}" fill="#0D0C09"/>
    <rect x="3" y="3" width="50" height="248" rx="2" fill="rgba(255,255,255,0.012)" stroke="rgba(210,178,100,0.1)" stroke-width="0.5"/>
    <rect x="57" y="3" width="80" height="250" rx="2" fill="rgba(255,255,255,0.018)" stroke="rgba(210,178,100,0.14)" stroke-width="0.5"/>
    <rect x="137" y="3" width="10" height="248" rx="1" fill="rgba(255,255,255,0.01)" stroke="rgba(210,178,100,0.09)" stroke-width="0.5"/>
    <rect x="147" y="3" width="108" height="248" rx="2" fill="rgba(255,255,255,0.018)" stroke="rgba(210,178,100,0.17)" stroke-width="0.5"/>
    <rect x="255" y="3" width="10" height="248" rx="1" fill="rgba(255,255,255,0.01)" stroke="rgba(210,178,100,0.07)" stroke-width="0.5"/>
    <rect x="257" y="68" width="45" height="84" rx="2" fill="rgba(255,255,255,0.01)" stroke="rgba(210,178,100,0.07)" stroke-width="0.5"/>
    <rect x="107" y="255" width="158" height="38" rx="2" fill="rgba(255,255,255,0.01)" stroke="rgba(210,178,100,0.07)" stroke-width="0.5"/>
    <line x1="201" y1="3" x2="201" y2="250" stroke="rgba(210,178,100,0.1)" stroke-width="0.3" stroke-dasharray="3,3"/>
    <text x="201" y="305" text-anchor="middle" font-size="8" fill="rgba(160,140,88,0.45)">前 · front</text>
    <text x="201" y="12" text-anchor="middle" font-size="8" fill="rgba(160,140,88,0.45)">後 · rear</text>
    <text x="30" y="145" text-anchor="middle" font-size="7" fill="rgba(130,115,75,0.4)" transform="rotate(-90,30,145)">書房 study</text>
    <text x="97" y="263" text-anchor="middle" font-size="7" fill="rgba(130,115,75,0.38)">橫厝 side wing</text>
    <text x="201" y="263" text-anchor="middle" font-size="7" fill="rgba(130,115,75,0.38)">正厝 main body</text>`;
  let rs='';
  rooms.forEach(r=>{
    if(!r.b)return;
    const col=C[r.b]||'#888';
    const a=!sb?0.55:(r.b===sb?0.88:0.06);
    rs+=`<rect x="${r.x}" y="${r.y}" width="${r.w}" height="${r.h}" rx="1.5" fill="${rgba(col,a)}" stroke="${rgba(col,Math.min(a+0.3,1))}" stroke-width="0.5" onmouseenter="tt(event,'<b>${r.id}</b><br>${r.l}<br><span style=color:${col}>■ ${BN[r.b]||r.b}</span>')" onmouseleave="ht()" style="cursor:default"/>`;
    if(r.w>24&&r.h>18){const lbl=year===1?r.id.split('-')[1]?.toUpperCase()||'':r.b==='communal'?'公':(BN[r.b]||'').split(' ')[0];rs+=`<text x="${r.x+r.w/2}" y="${r.y+r.h/2}" text-anchor="middle" dominant-baseline="central" font-size="8" fill="${col}" opacity="${Math.min(a+0.35,0.9)}" font-weight="500">${lbl}</text>`;}
  });
  document.getElementById('dcon').innerHTML=`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="display:block;max-width:100%;max-height:100%;border-radius:4px">${bg}${rs}</svg>`;
}

function rTulou(){
  const W=354,H=354,cx=177,cy=177,OR=144,IR=95,CR=46,N=24;
  const states=getTS(year);
  const selSt=sel==='chuantai'?['dian','transferred','peripheral']:sel==='qincai'?['transferred']:null;
  let bays='',inner='',pit='',annot='';
  for(let i=0;i<N;i++){
    const st=states[i];const col=SC[st]||'#1E1C15';
    const sa=(i/N)*2*Math.PI-Math.PI/2+0.04,ea=((i+1)/N)*2*Math.PI-Math.PI/2-0.04,la=(ea-sa>Math.PI)?1:0;
    const ox1=cx+OR*Math.cos(sa),oy1=cy+OR*Math.sin(sa),ox2=cx+OR*Math.cos(ea),oy2=cy+OR*Math.sin(ea);
    const ix1=cx+IR*Math.cos(sa),iy1=cy+IR*Math.sin(sa),ix2=cx+IR*Math.cos(ea),iy2=cy+IR*Math.sin(ea);
    const a=!selSt?0.75:(selSt.includes(st)?0.95:0.08);
    bays+=`<path d="M${ox1.toFixed(1)} ${oy1.toFixed(1)} A${OR} ${OR} 0 ${la} 1 ${ox2.toFixed(1)} ${oy2.toFixed(1)} L${ix2.toFixed(1)} ${iy2.toFixed(1)} A${IR} ${IR} 0 ${la} 0 ${ix1.toFixed(1)} ${iy1.toFixed(1)} Z" fill="${rgba(col,a)}" stroke="${rgba(col,Math.min(a+0.25,1))}" stroke-width="0.5" style="cursor:default" onmouseenter="tt(event,'<b>bay ${i}</b><br>${SLZH[st]||st} · ${SLEN[st]||st}')" onmouseleave="ht()"/>`;
  }
  const NI=18;
  for(let i=0;i<NI;i++){
    const sa=(i/NI)*2*Math.PI-Math.PI/2+0.05,ea=((i+1)/NI)*2*Math.PI-Math.PI/2-0.05;
    const r1=IR-5,r2=CR+5;
    const ox1=cx+r1*Math.cos(sa),oy1=cy+r1*Math.sin(sa),ox2=cx+r1*Math.cos(ea),oy2=cy+r1*Math.sin(ea);
    const ix1=cx+r2*Math.cos(sa),iy1=cy+r2*Math.sin(sa),ix2=cx+r2*Math.cos(ea),iy2=cy+r2*Math.sin(ea);
    inner+=`<path d="M${ox1.toFixed(1)} ${oy1.toFixed(1)} A${r1} ${r1} 0 0 1 ${ox2.toFixed(1)} ${oy2.toFixed(1)} L${ix2.toFixed(1)} ${iy2.toFixed(1)} A${r2} ${r2} 0 0 0 ${ix1.toFixed(1)} ${iy1.toFixed(1)} Z" fill="rgba(40,36,26,0.7)" stroke="rgba(90,80,55,0.18)" stroke-width="0.5"/>`;
  }
  if(year>=3){
    const ma=((19.5/N)*2*Math.PI-Math.PI/2);
    const px=cx+(OR+30)*Math.cos(ma),py=cy+(OR+30)*Math.sin(ma);
    pit=`<circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="12" fill="${rgba(SC.peripheral,0.72)}" stroke="${rgba('#D06050',0.45)}" stroke-width="0.5" stroke-dasharray="2,2" style="cursor:default" onmouseenter="tt(event,'<b>糞堈 manure pit</b><br>樓外，無界址<br>Outside tulou wall — appended without boundary formula<br>又帶 = liminal, gray zone')" onmouseleave="ht()"/>
    <line x1="${(cx+OR*Math.cos(ma)).toFixed(1)}" y1="${(cy+OR*Math.sin(ma)).toFixed(1)}" x2="${px.toFixed(1)}" y2="${py.toFixed(1)}" stroke="rgba(180,90,60,0.28)" stroke-width="0.5" stroke-dasharray="2,1"/>
    <text x="${px.toFixed(1)}" y="${(py+20).toFixed(1)}" text-anchor="middle" font-size="8" fill="rgba(190,120,90,0.65)">糞堈</text>`;
  }
  if(year>=1){const a=(15.5/N)*2*Math.PI-Math.PI/2;annot+=`<text x="${(cx+(OR+18)*Math.cos(a)).toFixed(1)}" y="${(cy+(OR+18)*Math.sin(a)).toFixed(1)}" text-anchor="end" font-size="8" fill="rgba(210,165,55,0.85)">1873</text>`;}
  if(year>=2){const a=(6.5/N)*2*Math.PI-Math.PI/2;annot+=`<text x="${(cx+(OR+18)*Math.cos(a)).toFixed(1)}" y="${(cy+(OR+18)*Math.sin(a)).toFixed(1)}" text-anchor="start" font-size="8" fill="rgba(210,100,75,0.85)">1878</text>`;}
  if(year>=3){const a=(19.5/N)*2*Math.PI-Math.PI/2;annot+=`<text x="${(cx+(OR+44)*Math.cos(a)).toFixed(1)}" y="${(cy+(OR+44)*Math.sin(a)).toFixed(1)}" text-anchor="end" font-size="8" fill="rgba(210,100,75,0.75)">1879</text>`;}
  document.getElementById('dcon').innerHTML=`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="display:block;max-width:100%;max-height:100%;background:#0D0C09;border-radius:4px">
    <circle cx="${cx}" cy="${cy}" r="${OR+5}" fill="rgba(25,22,15,0.85)" stroke="rgba(140,120,70,0.1)" stroke-width="0.5"/>
    ${bays}${inner}
    <circle cx="${cx}" cy="${cy}" r="${CR}" fill="rgba(20,18,12,0.9)" stroke="rgba(110,100,65,0.18)" stroke-width="0.5"/>
    <rect x="${cx-20}" y="${cy-24}" width="40" height="48" rx="2" fill="rgba(35,30,20,0.85)" stroke="rgba(110,100,65,0.22)" stroke-width="0.5"/>
    <text x="${cx}" y="${cy-6}" text-anchor="middle" font-size="9" fill="rgba(175,155,95,0.65)">祖堂</text>
    <text x="${cx}" y="${cy+8}" text-anchor="middle" font-size="7" fill="rgba(135,118,75,0.45)">ancestral hall</text>
    <text x="${cx}" y="${cy-OR-14}" text-anchor="middle" font-size="8" fill="rgba(135,118,75,0.42)">上堂 upper hall</text>
    <text x="${cx}" y="${cy+OR+16}" text-anchor="middle" font-size="8" fill="rgba(135,118,75,0.42)">正門 main gate</text>
    ${pit}${annot}
  </svg>`;
}

function rDTree(){
  const tr=DTREE;let edges='',nodes='';
  tr.edges.forEach(([f,t])=>{const fp=tr.persons.find(p=>p.id===f),tp=tr.persons.find(p=>p.id===t);if(fp&&tp)edges+=`<line x1="${fp.x+32}" y1="${fp.y+20}" x2="${tp.x+32}" y2="${tp.y}" stroke="rgba(200,170,90,0.14)" stroke-width="0.5"/>`;});
  tr.persons.forEach(p=>{
    const col=C[p.b]||'#786C58';const isSel=sel===p.id;
    const vis=year===0?['laogu','shilian','qian','kun'].includes(p.id):true;
    nodes+=`<g onclick="selP('${p.id}')" onmouseenter="tt(event,'<b>${p.name} · ${p.ne}</b><br>${p.note}')" onmouseleave="ht()" style="cursor:pointer;opacity:${vis?1:0.2}">
      <rect x="${p.x}" y="${p.y}" width="62" height="22" rx="3" fill="${rgba(col,isSel?0.7:0.28)}" stroke="${rgba(col,isSel?0.9:0.45)}" stroke-width="${isSel?1.2:0.5}"/>
      <text x="${p.x+31}" y="${p.y+8}" text-anchor="middle" dominant-baseline="central" font-size="9" fill="${col}" font-weight="500">${p.name}</text>
      <text x="${p.x+31}" y="${p.y+17}" text-anchor="middle" dominant-baseline="central" font-size="7" fill="${col}" opacity=".55">${p.ne}</text>
    </g>`;
  });
  document.getElementById('tcon').innerHTML=`<svg width="205" height="165" viewBox="0 0 205 165" style="width:100%">${edges}${nodes}<text x="0" y="161" font-size="8" fill="rgba(140,120,70,0.45)"></text></svg>`;
}

function rTTree(){
  const tr=TTREE;let edges='',nodes='';
  tr.edges.forEach(([f,t])=>{const fp=tr.persons.find(p=>p.id===f),tp=tr.persons.find(p=>p.id===t);if(fp&&tp)edges+=`<line x1="${fp.x+35}" y1="${fp.y+22}" x2="${tp.x+35}" y2="${tp.y}" stroke="rgba(200,170,90,0.14)" stroke-width="0.5" stroke-dasharray="2,2"/>`;});
  tr.persons.forEach(p=>{
    const col=C[p.b]||'#786C58';const isSel=sel===p.id;const isCT=p.id==='chuantai';
    nodes+=`<g onclick="selP('${p.id}')" onmouseenter="tt(event,'<b>${p.name} · ${p.ne}</b><br>${p.note}')" onmouseleave="ht()" style="cursor:pointer">
      <rect x="${p.x}" y="${p.y}" width="68" height="22" rx="3" fill="${rgba(col,isSel?0.7:0.26)}" stroke="${rgba(col,isSel?0.9:0.45)}" stroke-width="${isSel?1.2:0.5}"/>
      <text x="${p.x+34}" y="${p.y+8}" text-anchor="middle" dominant-baseline="central" font-size="${isCT?8:9}" fill="${col}" font-weight="${isCT?'600':'500'}">${p.name}</text>
      <text x="${p.x+34}" y="${p.y+17}" text-anchor="middle" dominant-baseline="central" font-size="7" fill="${col}" opacity=".5">${p.ne}</text>
    </g>`;
  });
  document.getElementById('tcon').innerHTML=`<svg width="210" height="168" viewBox="0 0 210 168" style="width:100%">${edges}${nodes}<text x="0" y="164" font-size="8" fill="rgba(140,120,70,0.45)">在堂母鄭氏 witnesses every contract</text></svg>`;
}

function rDE(){
  const items=DE[year]||[];const sb=sel?DTREE.persons.find(p=>p.id===sel)?.b:null;
  document.getElementById('elist').innerHTML=items.map(it=>{
    const col=C[it.b]||'#888';const a=!sb?1:(it.b===sb?1:0.18);
    return`<div class="ei" style="border-left-color:${rgba(col,a*0.85)};opacity:${a}"><div class="br-lbl"><span style="width:7px;height:7px;border-radius:50%;background:${rgba(col,0.8)};flex-shrink:0;display:inline-block"></span><span style="color:${col}">${BN[it.b]||'—'}</span></div><div class="zh-src">${it.zh}</div><div class="en-tr">${it.en}</div></div>`;
  }).join('');
}

function rTE(){
  const items=TE[year]||[];const sc={dian:'#C89030',transferred:'#D06050'};
  document.getElementById('elist').innerHTML=items.map(it=>`<div class="ei" style="border-left-color:${sc[it.b]||'rgba(120,100,60,0.4)'}"><div class="zh-src">${it.zh}</div><div class="en-tr">${it.en}</div></div>`).join('');
}

function rDLeg(){
  const bs=year===0?['qian','kun','communal']:['meng','zhong','shu','ji','communal'];
  document.getElementById('gleg').innerHTML=bs.map(b=>{const[zh,en]=(BN[b]||'').split(' ');return`<div class="li"><div class="ls" style="background:${rgba(C[b],0.6)}"></div><span class="z">${zh}</span><span class="e">${en||''}</span></div>`}).join('');
}

function rTLeg(){
  const it=[['#C89030','典押中','mortgaged 典'],['#D06050','已轉讓','transferred/lost'],['#C08070','棚房附件','peripheral shed'],['#2CA880','公共','communal'],['#2A2620','其他住戶','other households']];
  document.getElementById('gleg').innerHTML=it.map(([c,z,e])=>`<div class="li"><div class="ls" style="background:${rgba(c,0.7)}"></div><span class="z">${z}</span><span class="e">${e}</span></div>`).join('');
}

renderAll();
</script>
